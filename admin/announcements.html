<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt Studio AI - Announcements Broadcast Console</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <!-- Core styles -->
    <link rel="stylesheet" href="/admin/css/admin.css" />
    <link rel="stylesheet" href="/admin/css/responsive.css" />
  </head>
  <body>

    <!-- Sidebar injection target -->
    <div id="admin-sidebar-target"></div>

    <!-- Main Content Panel -->
    <div class="admin-main-wrapper">
      
      <!-- Header target -->
      <div id="admin-header-target" data-title="Active System Broadcasts"></div>

      <div class="row g-4 animate-fade-in">
        <!-- Draft Form Column -->
        <div class="col-12 col-md-5">
          <div class="premium-card">
            <h5 class="fw-bold text-dark mb-3"><i class="bi bi-pencil-square text-primary me-2"></i>Draft New Alert Notice</h5>
            <form id="announcement-form" onsubmit="event.preventDefault(); publishAnnouncement();">
              <div class="mb-3 text-start">
                <label class="form-label fs-9 fw-bold text-muted text-uppercase">Alert Headline / Title</label>
                <input type="text" class="form-control rounded-3 fs-8" id="announcement-title" placeholder="e.g. Scheduled Cluster Maintenance" required />
              </div>

              <div class="mb-3 text-start">
                <label class="form-label fs-9 fw-bold text-muted text-uppercase">Priority Category</label>
                <select class="form-select rounded-3 fs-8" id="announcement-priority">
                  <option value="Critical">🚨 Critical Action Required</option>
                  <option value="Important">⚠️ Important Alert</option>
                  <option value="Notice">📢 System Notice</option>
                </select>
              </div>

              <div class="mb-4 text-start">
                <label class="form-label fs-9 fw-bold text-muted text-uppercase">Detailed Notice Message</label>
                <textarea class="form-control rounded-3 fs-8" id="announcement-description" rows="5" placeholder="Enter instructions or notification details..." required></textarea>
              </div>

              <button type="submit" class="btn btn-primary w-100 fw-bold py-2.5 rounded-3 hover-scale fs-8 shadow-sm">
                <i class="bi bi-send-fill me-1.5"></i>Broadcast Alert Notice
              </button>
            </form>
          </div>
        </div>

        <!-- Broadcast Feed Column -->
        <div class="col-12 col-md-7">
          <div class="premium-card">
            <h5 class="fw-bold text-dark mb-3"><i class="bi bi-megaphone-fill text-danger me-2"></i>Published Active Feeds</h5>
            <div id="announcements-feed-container" class="d-flex flex-column gap-3">
              <!-- Rendered dynamically -->
            </div>
          </div>
        </div>
      </div>

    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom Admin Scripts -->
    <script src="/admin/js/storage.js" type="module"></script>
    <script src="/admin/js/admin.js" type="module"></script>

    <script>
      function renderAnnouncements() {
        const container = document.getElementById('announcements-feed-container');
        if (!container) return;

        const list = StorageHelper.get('ps_announcements');
        if (list.length === 0) {
          container.innerHTML = `
            <div class="text-center py-5 text-muted">
              <i class="bi bi-bell-slash fs-1 d-block mb-2 text-muted"></i>
              <span>No alerts or broadcast messages published.</span>
            </div>
          `;
        } else {
          container.innerHTML = list.map(a => {
            const priorityClass = a.priority === 'Critical' ? 'bg-danger text-white' : (a.priority === 'Important' ? 'bg-warning text-dark' : 'bg-primary text-white');
            return `
              <div class="p-3 border rounded-4 bg-light shadow-sm position-relative animate-fade-in">
                <div class="d-flex align-items-center justify-content-between mb-2">
                  <span class="badge ${priorityClass} fs-9 rounded px-2.5 py-1 text-uppercase" style="font-size: 9px;">${a.priority}</span>
                  <span class="text-muted fs-9" style="font-size: 11px;">Published: ${a.date}</span>
                </div>
                <h5 class="fw-bold text-dark mb-1 fs-8">${a.title}</h5>
                <p class="text-muted fs-8 mb-0 leading-relaxed" style="font-size: 12px;">${a.description}</p>
                <button class="btn btn-link text-danger p-1 position-absolute top-0 end-0 mt-2 me-2" onclick="deleteAnnouncement('${a.id}')" title="Delete Announcement">
                  <i class="bi bi-trash fs-8"></i>
                </button>
              </div>
            `;
          }).join('');
        }
      }

      window.publishAnnouncement = function() {
        const title = document.getElementById('announcement-title').value.trim();
        const priority = document.getElementById('announcement-priority').value;
        const description = document.getElementById('announcement-description').value.trim();

        if (!title || !description) return;

        const list = StorageHelper.get('ps_announcements');
        const newAnn = {
          id: "ann-" + Date.now(),
          title,
          priority,
          description,
          date: new Date().toISOString().replace('T', ' ').substring(0, 16)
        };

        list.unshift(newAnn);
        StorageHelper.set('ps_announcements', list);

        StorageHelper.addLog("admin@promptstudio.ai", "Published Alert", "Settings", "Success", `Published broadcast notice: ${title}`);
        StorageHelper.addNotification(`System Alert Broadcast: "${title}"`, "System");

        // Reset form & reload list
        document.getElementById('announcement-form').reset();
        renderAnnouncements();
      };

      window.deleteAnnouncement = function(id) {
        if (confirm("Are you sure you want to retract/delete this broadcast alert?")) {
          const list = StorageHelper.get('ps_announcements');
          const target = list.find(a => a.id === id);
          const updated = list.filter(a => a.id !== id);
          StorageHelper.set('ps_announcements', updated);

          StorageHelper.addLog("admin@promptstudio.ai", "Retracted Alert", "Settings", "Success", `Retracted notice: ${target ? target.title : id}`);
          renderAnnouncements();
        }
      };

      document.addEventListener('DOMContentLoaded', renderAnnouncements);
    </script>
  </body>
</html>
