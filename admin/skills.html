<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt Studio AI - Skill Center</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <!-- Core styles -->
    <link rel="stylesheet" href="/admin/css/admin.css" />
    <link rel="stylesheet" href="/admin/css/responsive.css" />
  </head>
  <body>

    <!-- Sidebar injection target -->
    <div id="admin-sidebar-target"></div>

    <!-- Main Content Panel -->
    <div class="admin-main-wrapper">
      
      <!-- Header target -->
      <div id="admin-header-target" data-title="Skill Center"></div>

      <!-- Filters Row -->
      <div class="premium-card p-3.5 mb-4 animate-fade-in">
        <div class="row g-3 align-items-center justify-content-between">
          <div class="col-12 col-md-8 d-flex flex-wrap gap-2">
            <!-- Search bar -->
            <div class="position-relative flex-grow-1" style="max-width: 320px;">
              <span class="position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"><i class="bi bi-search"></i></span>
              <input type="text" class="form-control rounded-pill ps-5 fs-8" id="skill-search" placeholder="Search skills by keyword..." />
            </div>

            <!-- Category filter -->
            <select class="form-select rounded-pill fs-8" id="skill-category-filter" style="max-width: 140px;">
              <option value="All">All Categories</option>
              <option value="built-in">Built-In</option>
              <option value="custom">Custom</option>
            </select>
          </div>

          <div class="col-12 col-md-auto text-md-end d-flex gap-2">
            <!-- Hidden File Input for import -->
            <input type="file" id="skill-import-file" class="d-none" accept=".json" onchange="handleImportSkillFile(event)" />
            
            <button class="btn btn-outline-primary rounded-pill px-3 fs-8 fw-semibold" onclick="triggerImportSkill()">
              <i class="bi bi-upload me-1.5"></i>Import JSON
            </button>
            <button class="btn btn-primary rounded-pill px-3.5 fs-8 fw-semibold" data-bs-toggle="modal" data-bs-target="#skillAddModal">
              <i class="bi bi-plus-lg me-1.5"></i>Create Skill
            </button>
          </div>
        </div>
      </div>

      <!-- Skills Grid Table -->
      <div class="premium-card mb-4 animate-fade-in">
        <div class="table-responsive">
          <table class="table custom-table align-middle mb-0 fs-8">
            <thead>
              <tr>
                <th>ID</th>
                <th>Skill Details</th>
                <th>Category</th>
                <th>Version</th>
                <th>System Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="skills-table-body">
              <!-- Rendered dynamically by skills.js -->
            </tbody>
          </table>
        </div>
      </div>

    </div>

    <!-- ==========================================
         MODALS & DIALOGS
         ========================================== -->

    <!-- Modal 1: Create Skill -->
    <div class="modal fade" id="skillAddModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered" style="max-width: 460px;">
        <div class="modal-content border-0" style="border-radius: 20px;">
          <div class="modal-header border-0 pb-0">
            <h5 class="fw-bold text-dark mb-0">Create Custom Agent Skill</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="add-skill-form" onsubmit="event.preventDefault(); createNewSkill();">
              <div class="mb-3 text-start">
                <label class="form-label fs-9 fw-bold text-muted text-uppercase">Skill Title</label>
                <input type="text" class="form-control rounded-3 fs-8" id="add-skill-title" placeholder="e.g. Docker Deployment Agent" required />
              </div>

              <div class="mb-3 text-start">
                <label class="form-label fs-9 fw-bold text-muted text-uppercase">Brief Description</label>
                <input type="text" class="form-control rounded-3 fs-8" id="add-skill-description" placeholder="Short description explaining capabilities..." required />
              </div>

              <div class="mb-4 text-start">
                <label class="form-label fs-9 fw-bold text-muted text-uppercase">Features / Outputs (One per line)</label>
                <textarea class="form-control rounded-3 fs-8 font-monospace" id="add-skill-features" rows="4" placeholder="- Dockerfile construction&#10;- Port mapping diagnostics&#10;- Production staging setups"></textarea>
              </div>

              <button type="submit" class="btn btn-primary w-100 fw-bold py-2 rounded-3 hover-scale fs-8 shadow-sm">
                <i class="bi bi-plus-circle-fill me-1.5"></i>Deploy Custom Skill
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal 2: Edit Skill -->
    <div class="modal fade" id="skillEditModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered" style="max-width: 460px;">
        <div class="modal-content border-0" style="border-radius: 20px;">
          <div class="modal-header border-0 pb-0">
            <h5 class="fw-bold text-dark mb-0">Modify Agent Skill</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="edit-skill-id" />
            
            <div class="mb-3 text-start">
              <label class="form-label fs-9 fw-bold text-muted text-uppercase">Skill Title</label>
              <input type="text" class="form-control rounded-3 fs-8" id="edit-skill-title" required />
            </div>

            <div class="mb-3 text-start">
              <label class="form-label fs-9 fw-bold text-muted text-uppercase">Brief Description</label>
              <input type="text" class="form-control rounded-3 fs-8" id="edit-skill-description" required />
            </div>

            <div class="mb-4 text-start">
              <label class="form-label fs-9 fw-bold text-muted text-uppercase">Features (One per line)</label>
              <textarea class="form-control rounded-3 fs-8 font-monospace" id="edit-skill-features" rows="4" required></textarea>
            </div>

            <button class="btn btn-primary w-100 fw-bold py-2 rounded-3 hover-scale fs-8 shadow-sm" onclick="saveEditedSkill()">
              <i class="bi bi-save me-1.5"></i>Save Skill Blueprint
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom Admin Scripts -->
    <script src="/admin/js/storage.js" type="module"></script>
    <script src="/admin/js/admin.js" type="module"></script>
    <script src="/admin/js/skills.js" type="module"></script>
  </body>
</html>
