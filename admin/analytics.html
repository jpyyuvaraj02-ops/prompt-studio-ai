<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt Studio AI - Analytics Command Center</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <!-- Core styles -->
    <link rel="stylesheet" href="/admin/css/admin.css" />
    <link rel="stylesheet" href="/admin/css/responsive.css" />
  </head>
  <body>

    <!-- Sidebar injection target -->
    <div id="admin-sidebar-target"></div>

    <!-- Main Content Panel -->
    <div class="admin-main-wrapper">
      
      <!-- Header target -->
      <div id="admin-header-target" data-title="System Activity Analytics"></div>

      <!-- Overview statistics cards -->
      <div class="row g-3 mb-4 animate-fade-in">
        <div class="col-12 col-md-4">
          <div class="premium-card">
            <span class="text-muted fs-9 text-uppercase tracking-wider fw-bold">Active Subscriptions</span>
            <h2 class="fw-extrabold text-dark mt-1 mb-1">456</h2>
            <p class="text-muted fs-9 mb-0">Total active recurring memberships</p>
          </div>
        </div>

        <div class="col-12 col-md-4">
          <div class="premium-card">
            <span class="text-muted fs-9 text-uppercase tracking-wider fw-bold">Daily API Calls</span>
            <h2 class="fw-extrabold text-dark mt-1 mb-1">12,450 <span class="fs-9 text-success fw-normal"><i class="bi bi-arrow-up-short"></i>+8.5%</span></h2>
            <p class="text-muted fs-9 mb-0">Server requests received today</p>
          </div>
        </div>

        <div class="col-12 col-md-4">
          <div class="premium-card">
            <span class="text-muted fs-9 text-uppercase tracking-wider fw-bold">Sales Commission Net</span>
            <h2 class="fw-extrabold text-dark mt-1 mb-1">$1,867.50</h2>
            <p class="text-muted fs-9 mb-0">Net platform margins gathered from catalog sales</p>
          </div>
        </div>
      </div>

      <!-- CSS Charts Grid -->
      <div class="row g-4 mb-4 animate-fade-in">
        <!-- Daily Users Chart -->
        <div class="col-12 col-lg-8">
          <div class="premium-card">
            <h5 class="fw-bold text-dark mb-3"><i class="bi bi-graph-up text-primary me-2"></i>Daily Active Users (DAU History)</h5>
            <div id="chart-daily-users" style="height: 150px;">
              <!-- Injected by charts.js -->
            </div>
          </div>
        </div>

        <!-- Popular Categories Progress list -->
        <div class="col-12 col-lg-4">
          <div class="premium-card h-100">
            <h5 class="fw-bold text-dark mb-3"><i class="bi bi-pie-chart text-primary me-2"></i>Category Distributions</h5>
            <div id="chart-popular-categories">
              <!-- Injected by charts.js -->
            </div>
          </div>
        </div>
      </div>

    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom Admin Scripts -->
    <script src="/admin/js/storage.js"></script>
    <script src="/admin/js/charts.js"></script>
    <script src="/admin/js/admin.js" type="module"></script>
  </body>
</html>
