<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt Studio AI - Admin Portal</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <!-- Admin stylesheet -->
    <link rel="stylesheet" href="/admin/css/admin.css" />
    <style>
      body {
        background: radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, rgba(248, 250, 252, 1) 90.2%);
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>
  <body>

    <div class="container">
      <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-5 col-xl-4">
          
          <!-- Back Link -->
          <div class="text-center mb-4">
            <a href="/" class="text-decoration-none text-muted fs-8 fw-semibold hover-text-primary">
              <i class="bi bi-arrow-left me-1"></i>Back to Main Site
            </a>
          </div>

          <!-- Glass Login Card -->
          <div class="premium-card p-4 shadow-lg text-center" style="border-radius: 24px;">
            <!-- Logo Section -->
            <div class="d-inline-flex align-items-center justify-content-center bg-primary text-white rounded-4 shadow-sm mb-3" style="width: 52px; height: 52px;">
              <i class="bi bi-sparkles fs-3"></i>
            </div>
            
            <h3 class="fw-bold text-dark mb-1">Admin Portal</h3>
            <p class="text-muted fs-9 mb-4">Provide valid engineering cabinet credentials to enter.</p>

            <!-- Alert Banner -->
            <div id="login-alert" class="alert alert-danger fs-9 py-2 px-3 d-none rounded-3 text-start" role="alert">
              <i class="bi bi-exclamation-triangle-fill me-2"></i>Invalid credentials.
            </div>

            <form id="admin-login-form">
              <!-- Email Address -->
              <div class="mb-3 text-start">
                <label for="admin-email" class="form-label fs-9 fw-semibold text-muted text-uppercase tracking-wider">Admin Email</label>
                <div class="position-relative">
                  <span class="position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"><i class="bi bi-envelope"></i></span>
                  <input type="email" class="form-control rounded-3 border ps-5 py-2.5 fs-8" id="admin-email" placeholder="admin@promptstudio.ai" required />
                </div>
              </div>

              <!-- Password -->
              <div class="mb-4 text-start">
                <div class="d-flex justify-content-between">
                  <label for="admin-password" class="form-label fs-9 fw-semibold text-muted text-uppercase tracking-wider">Password</label>
                  <span class="text-primary fs-9 cursor-pointer" onclick="togglePasswordVisibility()"><i id="eye-icon" class="bi bi-eye"></i> Show</span>
                </div>
                <div class="position-relative">
                  <span class="position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"><i class="bi bi-lock"></i></span>
                  <input type="password" class="form-control rounded-3 border ps-5 py-2.5 fs-8" id="admin-password" placeholder="••••••••" required />
                </div>
              </div>

              <!-- Submit Button -->
              <button type="submit" class="btn btn-primary w-100 fw-bold py-2.5 rounded-3 hover-scale mb-3 shadow-sm fs-8">
                <span>Unlock Dashboard</span>
                <i class="bi bi-arrow-right-short fs-5 ms-1 align-middle"></i>
              </button>
            </form>

            <div class="border-top pt-3 text-center">
              <span class="text-muted fs-9">Demo Login: <b>admin@promptstudio.ai</b> / <b>admin123</b></span>
            </div>
          </div>

        </div>
      </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      function togglePasswordVisibility() {
        const pwdInput = document.getElementById('admin-password');
        const eyeIcon = document.getElementById('eye-icon');
        if (pwdInput.type === 'password') {
          pwdInput.type = 'text';
          eyeIcon.className = 'bi bi-eye-slash';
        } else {
          pwdInput.type = 'password';
          eyeIcon.className = 'bi bi-eye';
        }
      }

      document.getElementById('admin-login-form').addEventListener('submit', function(e) {
        e.preventDefault();
        const email = document.getElementById('admin-email').value.trim();
        const password = document.getElementById('admin-password').value.trim();
        const alertBanner = document.getElementById('login-alert');

        if (email === 'admin@promptstudio.ai' && password === 'admin123') {
          localStorage.setItem('ps_admin_logged_in', 'true');
          // Update core log using raw key storage
          const logs = JSON.parse(localStorage.getItem('ps_audit_logs')) || [];
          logs.unshift({
            date: new Date().toISOString().replace('T', ' ').substring(0, 16),
            user: email,
            action: "Admin Login",
            module: "Security",
            status: "Success",
            ip: "192.168.1.15",
            details: "Logged in successfully to Admin Panel."
          });
          localStorage.setItem('ps_audit_logs', JSON.stringify(logs));
          
          window.location.href = './dashboard.html';
        } else {
          alertBanner.classList.remove('d-none');
          alertBanner.innerText = "Invalid credentials. Try: admin@promptstudio.ai / admin123";
        }
      });
    </script>
  </body>
</html>
