<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt Studio AI - Moderation Reports</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <!-- Core styles -->
    <link rel="stylesheet" href="/admin/css/admin.css" />
    <link rel="stylesheet" href="/admin/css/responsive.css" />
  </head>
  <body>

    <!-- Sidebar injection target -->
    <div id="admin-sidebar-target"></div>

    <!-- Main Content Panel -->
    <div class="admin-main-wrapper">
      
      <!-- Header target -->
      <div id="admin-header-target" data-title="Moderation Incident Reports"></div>

      <!-- Incident Reports Grid -->
      <div class="premium-card mb-4 animate-fade-in text-start">
        <h5 class="fw-bold text-dark mb-3"><i class="bi bi-shield-fill-exclamation text-danger me-2"></i>Active Incident Reports</h5>
        <div class="table-responsive">
          <table class="table custom-table align-middle mb-0 fs-8">
            <thead>
              <tr>
                <th>Report ID</th>
                <th>Target Element</th>
                <th>Reporter</th>
                <th>Reason</th>
                <th>Date Logged</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="reports-table-body">
              <!-- Rendered dynamically -->
            </tbody>
          </table>
        </div>
      </div>

    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom Admin Scripts -->
    <script src="/admin/js/storage.js"></script>
    <script src="/admin/js/admin.js" type="module"></script>

    <script>
      function renderReportsTable() {
        const tableBody = document.getElementById('reports-table-body');
        if (!tableBody) return;

        const reports = StorageHelper.get('ps_incident_reports') || [
          { id: 'REP-001', target: 'ChatGPT Jailbreak Bypass', reporter: 'user12@gmail.com', reason: 'TOS Violations', date: '2026-07-01 10:45', status: 'Pending' },
          { id: 'REP-002', target: 'Automated Account Spammer', reporter: 'dev99@gmail.com', reason: 'Inappropriate Content', date: '2026-07-03 14:12', status: 'Resolved' }
        ];

        if (!localStorage.getItem('ps_incident_reports')) {
          localStorage.setItem('ps_incident_reports', JSON.stringify(reports));
        }

        if (reports.length === 0) {
          tableBody.innerHTML = `<tr><td colspan="7" class="text-center py-4 text-muted">No pending incident reports.</td></tr>`;
        } else {
          tableBody.innerHTML = reports.map(r => {
            const statusClass = r.status === 'Pending' ? 'badge-soft-warning' : 'badge-soft-success';
            return `
              <tr>
                <td><span class="font-monospace fw-bold text-muted">${r.id}</span></td>
                <td><span class="fw-bold text-dark">${r.target}</span></td>
                <td><span class="text-secondary">${r.reporter}</span></td>
                <td><span class="fw-semibold text-danger">${r.reason}</span></td>
                <td class="text-muted font-monospace">${r.date}</td>
                <td><span class="badge ${statusClass} px-2.5 py-1 text-uppercase" style="font-size: 9px;">${r.status}</span></td>
                <td>
                  <div class="d-flex align-items-center gap-1.5">
                    ${r.status === 'Pending' ? `
                      <button class="btn btn-outline-success btn-sm rounded-pill fs-9 px-2.5 py-0.5" onclick="resolveIncident('${r.id}')">
                        <i class="bi bi-shield-check me-1"></i>Resolve
                      </button>
                    ` : '<span class="text-muted fs-9 font-monospace">Closed Case</span>'}
                  </div>
                </td>
              </tr>
            `;
          }).join('');
        }
      }

      window.resolveIncident = function(id) {
        const reports = StorageHelper.get('ps_incident_reports') || [];
        const index = reports.findIndex(r => r.id === id);
        if (index !== -1) {
          reports[index].status = 'Resolved';
          StorageHelper.set('ps_incident_reports', reports);

          StorageHelper.addLog("admin@promptstudio.ai", "Resolved Incident Report", "Community", "Success", `Resolved moderation case: ${id}`);
          renderReportsTable();
        }
      };

      document.addEventListener('DOMContentLoaded', renderReportsTable);
    </script>
  </body>
</html>
