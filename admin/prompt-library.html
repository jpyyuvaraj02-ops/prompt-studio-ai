<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt Studio AI - Prompt Library</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <!-- Core styles -->
    <link rel="stylesheet" href="/admin/css/admin.css" />
    <link rel="stylesheet" href="/admin/css/responsive.css" />
  </head>
  <body>

    <!-- Sidebar injection target -->
    <div id="admin-sidebar-target"></div>

    <!-- Main Content Panel -->
    <div class="admin-main-wrapper">
      
      <!-- Header target -->
      <div id="admin-header-target" data-title="Prompt Library Master"></div>

      <!-- Action Panel -->
      <div class="premium-card p-3.5 mb-4 animate-fade-in">
        <div class="row g-3 align-items-center justify-content-between">
          <div class="col-12 col-md-8 d-flex flex-wrap gap-2">
            <!-- Search bar -->
            <div class="position-relative flex-grow-1" style="max-width: 300px;">
              <span class="position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"><i class="bi bi-search"></i></span>
              <input type="text" class="form-control rounded-pill ps-5 fs-8" id="prompt-search" placeholder="Search prompts..." onkeyup="renderPromptsTable()" />
            </div>

            <!-- Style filter -->
            <select class="form-select rounded-pill fs-8" id="prompt-style-filter" style="max-width: 140px;" onchange="renderPromptsTable()">
              <option value="All">All Formats</option>
              <option value="Few-shot">Few-shot</option>
              <option value="One-shot">One-shot</option>
              <option value="Zero-shot">Zero-shot</option>
            </select>
          </div>

          <div class="col-12 col-md-auto text-md-end">
            <button class="btn btn-primary rounded-pill px-3.5 fs-8 fw-semibold" data-bs-toggle="modal" data-bs-target="#promptAddModal">
              <i class="bi bi-journal-plus me-1.5"></i>Create Prompt Template
            </button>
          </div>
        </div>
      </div>

      <!-- Prompts Table -->
      <div class="premium-card mb-4 animate-fade-in">
        <div class="table-responsive">
          <table class="table custom-table align-middle mb-0 fs-8">
            <thead>
              <tr>
                <th>ID</th>
                <th>Title</th>
                <th>Category</th>
                <th>Style Format</th>
                <th>Word Count</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="prompts-table-body">
              <!-- Rendered dynamically -->
            </tbody>
          </table>
        </div>
      </div>

    </div>

    <!-- Create Prompt Modal -->
    <div class="modal fade" id="promptAddModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered" style="max-width: 520px;">
        <div class="modal-content" style="border-radius: 20px;">
          <div class="modal-header border-0 pb-0">
            <h5 class="fw-bold text-dark mb-0">Create Prompt Template</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body text-start">
            <form id="add-prompt-form" onsubmit="event.preventDefault(); addNewPrompt();">
              <div class="mb-3 text-start">
                <label class="form-label fs-9 fw-bold text-muted text-uppercase">Prompt Title</label>
                <input type="text" class="form-control rounded-3 fs-8" id="add-prompt-title" placeholder="e.g. Code Refactoring Assistant" required />
              </div>

              <div class="row g-3 mb-3">
                <div class="col-6">
                  <label class="form-label fs-9 fw-bold text-muted text-uppercase">Category</label>
                  <select class="form-select rounded-3 fs-8" id="add-prompt-category">
                    <option value="Frontend">Frontend</option>
                    <option value="Fullstack">Fullstack</option>
                    <option value="Database">Database</option>
                    <option value="AI">AI & ML</option>
                  </select>
                </div>
                <div class="col-6">
                  <label class="form-label fs-9 fw-bold text-muted text-uppercase">Style Format</label>
                  <select class="form-select rounded-3 fs-8" id="add-prompt-style">
                    <option value="Few-shot">Few-shot</option>
                    <option value="One-shot">One-shot</option>
                    <option value="Zero-shot">Zero-shot</option>
                  </select>
                </div>
              </div>

              <div class="mb-4 text-start">
                <label class="form-label fs-9 fw-bold text-muted text-uppercase">Prompt Template Text</label>
                <textarea class="form-control rounded-3 fs-8" id="add-prompt-text" rows="5" placeholder="Write instructions, placeholders and variables..." required></textarea>
              </div>

              <button type="submit" class="btn btn-primary w-100 fw-bold py-2.5 rounded-3 hover-scale fs-8 shadow-sm">
                <i class="bi bi-journal-plus me-1.5"></i>Create Prompt Template
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom Admin Scripts -->
    <script src="/admin/js/storage.js"></script>
    <script src="/admin/js/admin.js" type="module"></script>

    <script>
      function renderPromptsTable() {
        const tableBody = document.getElementById('prompts-table-body');
        if (!tableBody) return;

        const prompts = StorageHelper.get('ps_prompts_templates') || [
          { id: 'PR-101', title: 'Vue Composition Helper', category: 'Frontend', style: 'Few-shot', text: 'Structure Vue 3 tags using script setup paradigm.' },
          { id: 'PR-102', title: 'PostgreSQL Indexing Optimizer', category: 'Database', style: 'One-shot', text: 'Optimize sub-queries using index structures.' },
          { id: 'PR-103', title: 'Next.js Server Actions Handler', category: 'Fullstack', style: 'Zero-shot', text: 'Establish clean server-side action calls.' }
        ];

        // Ensure key exists
        if (!localStorage.getItem('ps_prompts_templates')) {
          localStorage.setItem('ps_prompts_templates', JSON.stringify(prompts));
        }

        const searchQuery = document.getElementById('prompt-search').value.toLowerCase();
        const styleFilter = document.getElementById('prompt-style-filter').value;

        const filtered = prompts.filter(p => {
          const matchesSearch = p.title.toLowerCase().includes(searchQuery) || p.category.toLowerCase().includes(searchQuery);
          const matchesStyle = styleFilter === 'All' || p.style === styleFilter;
          return matchesSearch && matchesStyle;
        });

        if (filtered.length === 0) {
          tableBody.innerHTML = `<tr><td colspan="6" class="text-center py-4 text-muted">No prompts templates found.</td></tr>`;
        } else {
          tableBody.innerHTML = filtered.map(p => {
            const wordCount = p.text ? p.text.split(/\s+/).length : 0;
            return `
              <tr>
                <td><span class="font-monospace fw-bold text-muted">${p.id}</span></td>
                <td><span class="fw-bold text-dark">${p.title}</span></td>
                <td><span class="badge bg-light text-dark border px-2 py-0.5">${p.category}</span></td>
                <td><span class="badge badge-soft-primary px-2 py-0.5 text-uppercase" style="font-size: 10px;">${p.style}</span></td>
                <td><span class="fw-semibold text-secondary">${wordCount} words</span></td>
                <td>
                  <button class="btn btn-outline-danger btn-sm rounded-circle px-2" onclick="deletePrompt('${p.id}')">
                    <i class="bi bi-trash"></i>
                  </button>
                </td>
              </tr>
            `;
          }).join('');
        }
      }

      window.addNewPrompt = function() {
        const title = document.getElementById('add-prompt-title').value.trim();
        const category = document.getElementById('add-prompt-category').value;
        const style = document.getElementById('add-prompt-style').value;
        const text = document.getElementById('add-prompt-text').value.trim();

        if (!title || !text) return;

        const prompts = StorageHelper.get('ps_prompts_templates') || [];
        const newId = "PR-" + (Math.floor(Math.random() * 900) + 100);
        const newPrompt = { id: newId, title, category, style, text };

        prompts.unshift(newPrompt);
        StorageHelper.set('ps_prompts_templates', prompts);

        StorageHelper.addLog("admin@promptstudio.ai", "Created Prompt Template", "Settings", "Success", `Created prompt library template: ${title}`);
        
        document.getElementById('add-prompt-form').reset();
        bootstrap.Modal.getInstance(document.getElementById('promptAddModal')).hide();
        renderPromptsTable();
      };

      window.deletePrompt = function(id) {
        if (confirm("Are you sure you want to delete this template from the prompt library?")) {
          const prompts = StorageHelper.get('ps_prompts_templates') || [];
          const updated = prompts.filter(p => p.id !== id);
          StorageHelper.set('ps_prompts_templates', updated);

          StorageHelper.addLog("admin@promptstudio.ai", "Deleted Prompt Template", "Settings", "Success", `Deleted template ${id}`);
          renderPromptsTable();
        }
      };

      document.addEventListener('DOMContentLoaded', renderPromptsTable);
    </script>
  </body>
</html>
