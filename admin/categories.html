<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt Studio AI - Category Manager</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <!-- Core styles -->
    <link rel="stylesheet" href="/admin/css/admin.css" />
    <link rel="stylesheet" href="/admin/css/responsive.css" />
  </head>
  <body>

    <!-- Sidebar injection target -->
    <div id="admin-sidebar-target"></div>

    <!-- Main Content Panel -->
    <div class="admin-main-wrapper">
      
      <!-- Header target -->
      <div id="admin-header-target" data-title="Category Management"></div>

      <div class="row g-4 animate-fade-in">
        <!-- New Category Column -->
        <div class="col-12 col-md-5">
          <div class="premium-card">
            <h5 class="fw-bold text-dark mb-3"><i class="bi bi-tag-fill text-primary me-2"></i>Create Custom Category</h5>
            <form id="category-form" onsubmit="event.preventDefault(); addNewCategory();">
              <div class="mb-3 text-start">
                <label class="form-label fs-9 fw-bold text-muted text-uppercase">Category Name</label>
                <input type="text" class="form-control rounded-3 fs-8" id="add-category-name" placeholder="e.g. DevOps & Infrastructure" required />
              </div>

              <div class="mb-4 text-start">
                <label class="form-label fs-9 fw-bold text-muted text-uppercase">Brief Description</label>
                <textarea class="form-control rounded-3 fs-8" id="add-category-description" rows="4" placeholder="Briefly explain the scope..." required></textarea>
              </div>

              <button type="submit" class="btn btn-primary w-100 fw-bold py-2.5 rounded-3 hover-scale fs-8 shadow-sm">
                <i class="bi bi-tag me-1.5"></i>Create Category Tag
              </button>
            </form>
          </div>
        </div>

        <!-- Active Categories Feed -->
        <div class="col-12 col-md-7">
          <div class="premium-card">
            <h5 class="fw-bold text-dark mb-3"><i class="bi bi-tags-fill text-primary me-2"></i>Active Taxonomy Tags</h5>
            <div id="categories-feed-container" class="d-flex flex-column gap-3">
              <!-- Rendered dynamically -->
            </div>
          </div>
        </div>
      </div>

    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom Admin Scripts -->
    <script src="/admin/js/storage.js"></script>
    <script src="/admin/js/admin.js" type="module"></script>

    <script>
      function renderCategories() {
        const container = document.getElementById('categories-feed-container');
        if (!container) return;

        const categories = StorageHelper.get('ps_categories') || [
          { id: 'CAT-1', name: 'Frontend', description: 'User interface development, layouts, styles, and web graphics rendering.' },
          { id: 'CAT-2', name: 'Fullstack', description: 'Server architectures, middleware routings, API gateways, and web apps.' },
          { id: 'CAT-3', name: 'Database', description: 'SQL relational queries, document schemas, performance indexes tuning.' }
        ];

        if (!localStorage.getItem('ps_categories')) {
          localStorage.setItem('ps_categories', JSON.stringify(categories));
        }

        container.innerHTML = categories.map(c => {
          return `
            <div class="p-3 border rounded-4 bg-light shadow-sm position-relative animate-fade-in text-start">
              <h5 class="fw-bold text-dark mb-1 fs-8">${c.name}</h5>
              <p class="text-muted fs-8 mb-0" style="font-size: 12px;">${c.description}</p>
              <button class="btn btn-link text-danger p-1 position-absolute top-0 end-0 mt-2 me-2" onclick="deleteCategory('${c.id}')" title="Delete Category">
                <i class="bi bi-trash fs-8"></i>
              </button>
            </div>
          `;
        }).join('');
      }

      window.addNewCategory = function() {
        const name = document.getElementById('add-category-name').value.trim();
        const description = document.getElementById('add-category-description').value.trim();

        if (!name || !description) return;

        const categories = StorageHelper.get('ps_categories') || [];
        const newId = "CAT-" + (categories.length + 1);
        const newCat = { id: newId, name, description };

        categories.push(newCat);
        StorageHelper.set('ps_categories', categories);

        StorageHelper.addLog("admin@promptstudio.ai", "Created Category", "Settings", "Success", `Created prompt category: ${name}`);

        document.getElementById('category-form').reset();
        renderCategories();
      };

      window.deleteCategory = function(id) {
        if (confirm("Are you sure you want to delete this taxonomy tag?")) {
          const categories = StorageHelper.get('ps_categories') || [];
          const updated = categories.filter(c => c.id !== id);
          StorageHelper.set('ps_categories', updated);

          StorageHelper.addLog("admin@promptstudio.ai", "Deleted Category", "Settings", "Success", `Deleted category ${id}`);
          renderCategories();
        }
      };

      document.addEventListener('DOMContentLoaded', renderCategories);
    </script>
  </body>
</html>
