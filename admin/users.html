<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt Studio AI - User Management</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <!-- Core styles -->
    <link rel="stylesheet" href="/admin/css/admin.css" />
    <link rel="stylesheet" href="/admin/css/responsive.css" />
  </head>
  <body>

    <!-- Sidebar injection target -->
    <div id="admin-sidebar-target"></div>

    <!-- Main Content Panel -->
    <div class="admin-main-wrapper">
      
      <!-- Header target -->
      <div id="admin-header-target" data-title="User Management"></div>

      <!-- Action Panel -->
      <div class="premium-card p-3.5 mb-4 animate-fade-in">
        <div class="row g-3 align-items-center justify-content-between">
          <div class="col-12 col-md-8 d-flex flex-wrap gap-2">
            <!-- Search bar -->
            <div class="position-relative flex-grow-1" style="max-width: 320px;">
              <span class="position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"><i class="bi bi-search"></i></span>
              <input type="text" class="form-control rounded-pill ps-5 fs-8" id="user-search-input" placeholder="Search user name or email..." />
            </div>

            <!-- Role filter -->
            <select class="form-select rounded-pill fs-8" id="user-role-filter" style="max-width: 140px;">
              <option value="All">All Roles</option>
              <option value="Admin">Admin</option>
              <option value="Creator">Creator</option>
              <option value="User">User</option>
            </select>

            <!-- Status filter -->
            <select class="form-select rounded-pill fs-8" id="user-status-filter" style="max-width: 140px;">
              <option value="All">All Statuses</option>
              <option value="Active">Active</option>
              <option value="Suspended">Suspended</option>
            </select>
          </div>

          <div class="col-12 col-md-auto text-md-end">
            <button class="btn btn-primary rounded-pill px-3.5 fs-8 fw-semibold" data-bs-toggle="modal" data-bs-target="#userAddModal">
              <i class="bi bi-person-plus me-1.5"></i>Create New User
            </button>
          </div>
        </div>
      </div>

      <!-- Users Grid Table -->
      <div class="premium-card mb-4 animate-fade-in">
        <div class="table-responsive">
          <table class="table custom-table align-middle mb-0 fs-8">
            <thead>
              <tr>
                <th>ID</th>
                <th>User Account</th>
                <th>Email Address</th>
                <th>Role</th>
                <th>Status</th>
                <th>Feeds</th>
                <th>Purchases</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="users-table-body">
              <!-- Rendered dynamically by users.js -->
            </tbody>
          </table>
        </div>

        <!-- Pagination Bar -->
        <div class="d-flex align-items-center justify-content-between px-3.5 py-3 border-top">
          <span class="text-muted fs-9">Displaying entries from storage cache</span>
          <nav>
            <ul class="pagination pagination-sm mb-0 rounded-pill border-0" id="users-pagination">
              <!-- Rendered dynamically -->
            </ul>
          </nav>
        </div>
      </div>

    </div>

    <!-- ==========================================
         MODALS & DIALOGS
         ========================================== -->

    <!-- Modal 1: View User details -->
    <div class="modal fade" id="userViewModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered" style="max-width: 400px;">
        <div class="modal-content border-0" style="border-radius: 20px;">
          <div class="modal-header border-0 pb-0">
            <h5 class="fw-bold text-dark mb-0">Account Details</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body" id="user-view-detail-body">
            <!-- Rendered dynamically -->
          </div>
        </div>
      </div>
    </div>

    <!-- Modal 2: Edit User Profile -->
    <div class="modal fade" id="userEditModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered" style="max-width: 420px;">
        <div class="modal-content border-0" style="border-radius: 20px;">
          <div class="modal-header border-0 pb-0">
            <h5 class="fw-bold text-dark mb-0">Edit User Profile</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="edit-user-id" />
            
            <div class="mb-3 text-start">
              <label class="form-label fs-9 fw-bold text-muted text-uppercase">Full Name</label>
              <input type="text" class="form-control rounded-3 fs-8" id="edit-user-name" required />
            </div>

            <div class="mb-3 text-start">
              <label class="form-label fs-9 fw-bold text-muted text-uppercase">Email Address</label>
              <input type="email" class="form-control rounded-3 fs-8" id="edit-user-email" required />
            </div>

            <div class="row g-2 mb-4">
              <div class="col-6">
                <label class="form-label fs-9 fw-bold text-muted text-uppercase">Role Level</label>
                <select class="form-select rounded-3 fs-8" id="edit-user-role">
                  <option value="User">User</option>
                  <option value="Creator">Creator</option>
                  <option value="Admin">Admin</option>
                </select>
              </div>
              <div class="col-6">
                <label class="form-label fs-9 fw-bold text-muted text-uppercase">Status</label>
                <select class="form-select rounded-3 fs-8" id="edit-user-status">
                  <option value="Active">Active</option>
                  <option value="Suspended">Suspended</option>
                </select>
              </div>
            </div>

            <button class="btn btn-primary w-100 fw-bold py-2 rounded-3 hover-scale fs-8 shadow-sm" onclick="saveEditedUser()">
              <i class="bi bi-check-lg me-1.5"></i>Save Profile Changes
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal 3: Add New User -->
    <div class="modal fade" id="userAddModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered" style="max-width: 420px;">
        <div class="modal-content border-0" style="border-radius: 20px;">
          <div class="modal-header border-0 pb-0">
            <h5 class="fw-bold text-dark mb-0">Manually Register User</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <form id="add-user-form" onsubmit="event.preventDefault(); addNewUser();">
              <div class="mb-3 text-start">
                <label class="form-label fs-9 fw-bold text-muted text-uppercase">Full Name</label>
                <input type="text" class="form-control rounded-3 fs-8" id="add-user-name" placeholder="John Doe" required />
              </div>

              <div class="mb-3 text-start">
                <label class="form-label fs-9 fw-bold text-muted text-uppercase">Email Address</label>
                <input type="email" class="form-control rounded-3 fs-8" id="add-user-email" placeholder="john@example.com" required />
              </div>

              <div class="row g-2 mb-4">
                <div class="col-6">
                  <label class="form-label fs-9 fw-bold text-muted text-uppercase">Role Level</label>
                  <select class="form-select rounded-3 fs-8" id="add-user-role">
                    <option value="User">User</option>
                    <option value="Creator">Creator</option>
                    <option value="Admin">Admin</option>
                  </select>
                </div>
                <div class="col-6">
                  <label class="form-label fs-9 fw-bold text-muted text-uppercase">Initial Status</label>
                  <select class="form-select rounded-3 fs-8" id="add-user-status">
                    <option value="Active">Active</option>
                    <option value="Suspended">Suspended</option>
                  </select>
                </div>
              </div>

              <button type="submit" class="btn btn-primary w-100 fw-bold py-2 rounded-3 hover-scale fs-8 shadow-sm">
                <i class="bi bi-person-plus-fill me-1.5"></i>Create Account
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom Admin Scripts -->
    <script src="/admin/js/storage.js" type="module"></script>
    <script src="/admin/js/admin.js" type="module"></script>
    <script src="/admin/js/users.js" type="module"></script>
  </body>
</html>
