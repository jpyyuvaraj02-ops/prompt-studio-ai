<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt Studio AI - System Audit Trail</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <!-- Core styles -->
    <link rel="stylesheet" href="/admin/css/admin.css" />
    <link rel="stylesheet" href="/admin/css/responsive.css" />
  </head>
  <body>

    <!-- Sidebar injection target -->
    <div id="admin-sidebar-target"></div>

    <!-- Main Content Panel -->
    <div class="admin-main-wrapper">
      
      <!-- Header target -->
      <div id="admin-header-target" data-title="System Audit Logs"></div>

      <!-- Action Panel -->
      <div class="premium-card p-3.5 mb-4 animate-fade-in">
        <div class="row g-3 align-items-center justify-content-between">
          <div class="col-12 col-md-9 d-flex flex-wrap gap-2">
            <!-- Search bar -->
            <div class="position-relative flex-grow-1" style="max-width: 300px;">
              <span class="position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"><i class="bi bi-search"></i></span>
              <input type="text" class="form-control rounded-pill ps-5 fs-8" id="log-search" placeholder="Search actor email, details..." />
            </div>

            <!-- Module Filter -->
            <select class="form-select rounded-pill fs-8" id="log-module-filter" style="max-width: 140px;">
              <option value="All">All Modules</option>
              <option value="Security">Security</option>
              <option value="Users">Users</option>
              <option value="Community">Community</option>
              <option value="Marketplace">Marketplace</option>
              <option value="Settings">Settings</option>
            </select>

            <!-- Status Filter -->
            <select class="form-select rounded-pill fs-8" id="log-status-filter" style="max-width: 130px;">
              <option value="All">All Statuses</option>
              <option value="Success">Success</option>
              <option value="Failed">Failed</option>
            </select>
          </div>

          <div class="col-12 col-md-auto text-md-end d-flex gap-2">
            <button class="btn btn-outline-secondary rounded-pill px-3 fs-8" onclick="clearAuditLogs()">
              <i class="bi bi-trash3 me-1"></i>Reset Trail
            </button>
            <button class="btn btn-primary rounded-pill px-3.5 fs-8 fw-semibold" onclick="exportLogsToCSV()">
              <i class="bi bi-file-earmark-spreadsheet me-1"></i>Export CSV
            </button>
          </div>
        </div>
      </div>

      <!-- Logs Grid Table -->
      <div class="premium-card mb-4 animate-fade-in">
        <div class="table-responsive">
          <table class="table custom-table align-middle mb-0 fs-8">
            <thead>
              <tr>
                <th>Timestamp</th>
                <th>Actor Email</th>
                <th>Action Code</th>
                <th>Module</th>
                <th>Diagnostic Details</th>
                <th>Client IP</th>
                <th>Status</th>
              </tr>
            </thead>
            <tbody id="logs-table-body">
              <!-- Rendered dynamically -->
            </tbody>
          </table>
        </div>
      </div>

    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom Admin Scripts -->
    <script src="/admin/js/storage.js" type="module"></script>
    <script src="/admin/js/admin.js" type="module"></script>

    <script>
      function renderAuditLogsTable() {
        const tableBody = document.getElementById('logs-table-body');
        if (!tableBody) return;

        const logs = StorageHelper.get('ps_audit_logs');
        const searchQuery = document.getElementById('log-search').value.toLowerCase();
        const moduleFilter = document.getElementById('log-module-filter').value;
        const statusFilter = document.getElementById('log-status-filter').value;

        const filtered = logs.filter(l => {
          const matchesSearch = l.user.toLowerCase().includes(searchQuery) || l.action.toLowerCase().includes(searchQuery) || l.details.toLowerCase().includes(searchQuery);
          const matchesModule = moduleFilter === 'All' || l.module === moduleFilter;
          const matchesStatus = statusFilter === 'All' || l.status === statusFilter;
          return matchesSearch && matchesModule && matchesStatus;
        });

        if (filtered.length === 0) {
          tableBody.innerHTML = `<tr><td colspan="7" class="text-center py-4 text-muted">No diagnostic audit logs found.</td></tr>`;
        } else {
          tableBody.innerHTML = filtered.map(l => {
            const statusClass = l.status === 'Success' ? 'badge-soft-success' : 'bg-danger bg-opacity-10 text-danger';
            return `
              <tr>
                <td class="text-muted font-monospace" style="font-size: 11px;">${l.date}</td>
                <td class="fw-bold text-dark">${l.user}</td>
                <td class="fw-semibold text-secondary text-nowrap">${l.action}</td>
                <td><span class="badge bg-light text-dark border px-2 py-0.5">${l.module}</span></td>
                <td class="text-muted text-wrap" style="max-width: 320px; font-size: 11.5px;">${l.details}</td>
                <td class="text-muted font-monospace">${l.ip || '127.0.0.1'}</td>
                <td><span class="badge ${statusClass} px-2 py-1 rounded text-uppercase" style="font-size: 9.5px;">${l.status}</span></td>
              </tr>
            `;
          }).join('');
        }
      }

      window.clearAuditLogs = function() {
        if (confirm("Are you sure you want to clear the entire log history? This will restore only standard initial events.")) {
          localStorage.removeItem('ps_audit_logs');
          // Re-initialize using StorageHelper
          location.reload();
        }
      };

      window.exportLogsToCSV = function() {
        const logs = StorageHelper.get('ps_audit_logs');
        let csvContent = "data:text/csv;charset=utf-8,Timestamp,Actor,Action,Module,Details,IP,Status\n";

        logs.forEach(l => {
          const row = [
            `"${l.date}"`,
            `"${l.user}"`,
            `"${l.action}"`,
            `"${l.module}"`,
            `"${l.details.replace(/"/g, '""')}"`,
            `"${l.ip || '127.0.0.1'}"`,
            `"${l.status}"`
          ].join(",");
          csvContent += row + "\n";
        });

        const encodedUri = encodeURI(csvContent);
        const link = document.createElement("a");
        link.setAttribute("href", encodedUri);
        link.setAttribute("download", `prompt_studio_audit_logs_${Date.now()}.csv`);
        document.body.appendChild(link);
        link.click();
        link.remove();
      };

      document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('log-search').addEventListener('keyup', renderAuditLogsTable);
        document.getElementById('log-module-filter').addEventListener('change', renderAuditLogsTable);
        document.getElementById('log-status-filter').addEventListener('change', renderAuditLogsTable);

        renderAuditLogsTable();
      });
    </script>
  </body>
</html>
