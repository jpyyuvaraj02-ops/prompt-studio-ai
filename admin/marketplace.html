<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt Studio AI - Marketplace Control</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <!-- Core styles -->
    <link rel="stylesheet" href="/admin/css/admin.css" />
    <link rel="stylesheet" href="/admin/css/responsive.css" />
  </head>
  <body>

    <!-- Sidebar injection target -->
    <div id="admin-sidebar-target"></div>

    <!-- Main Content Panel -->
    <div class="admin-main-wrapper">
      
      <!-- Header target -->
      <div id="admin-header-target" data-title="Marketplace Catalog"></div>

      <!-- Filters Row -->
      <div class="premium-card p-3.5 mb-4 animate-fade-in">
        <div class="row g-3 align-items-center">
          <div class="col-12 col-md-8 d-flex flex-wrap gap-2">
            <!-- Search bar -->
            <div class="position-relative flex-grow-1" style="max-width: 320px;">
              <span class="position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"><i class="bi bi-search"></i></span>
              <input type="text" class="form-control rounded-pill ps-5 fs-8" id="market-search" placeholder="Search product title, creator..." />
            </div>

            <!-- Category filter -->
            <select class="form-select rounded-pill fs-8" id="market-category-filter" style="max-width: 140px;">
              <option value="All">All Categories</option>
              <option value="AI">AI & LLM</option>
              <option value="Database">Database</option>
              <option value="Fullstack">Full Stack</option>
              <option value="Frontend">Frontend</option>
            </select>

            <!-- Status filter -->
            <select class="form-select rounded-pill fs-8" id="market-status-filter" style="max-width: 140px;">
              <option value="All">All Statuses</option>
              <option value="approved">Approved</option>
              <option value="pending">Pending</option>
              <option value="rejected">Rejected</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Marketplace Catalog Table Grid -->
      <div class="premium-card mb-4 animate-fade-in">
        <div class="table-responsive">
          <table class="table custom-table align-middle mb-0 fs-8">
            <thead>
              <tr>
                <th>ID</th>
                <th>Product Information</th>
                <th>Author / Creator</th>
                <th>Category</th>
                <th>Base Price</th>
                <th>Downloads</th>
                <th>Rating</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="marketplace-table-body">
              <!-- Rendered dynamically by marketplace.js -->
            </tbody>
          </table>
        </div>
      </div>

    </div>

    <!-- ==========================================
         MODALS & DIALOGS
         ========================================== -->

    <!-- Modal 1: Edit Product -->
    <div class="modal fade" id="productEditModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered" style="max-width: 460px;">
        <div class="modal-content border-0" style="border-radius: 20px;">
          <div class="modal-header border-0 pb-0">
            <h5 class="fw-bold text-dark mb-0">Modify Marketplace Product</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="edit-product-id" />
            
            <div class="mb-3 text-start">
              <label class="form-label fs-9 fw-bold text-muted text-uppercase">Product Title</label>
              <input type="text" class="form-control rounded-3 fs-8" id="edit-product-title" required />
            </div>

            <div class="mb-3 text-start">
              <label class="form-label fs-9 fw-bold text-muted text-uppercase">Brief Description</label>
              <textarea class="form-control rounded-3 fs-8" id="edit-product-description" rows="3" required></textarea>
            </div>

            <div class="row g-2 mb-4">
              <div class="col-6">
                <label class="form-label fs-9 fw-bold text-muted text-uppercase">Category</label>
                <select class="form-select rounded-3 fs-8" id="edit-product-category">
                  <option value="AI">AI</option>
                  <option value="Database">Database</option>
                  <option value="Fullstack">Fullstack</option>
                  <option value="Frontend">Frontend</option>
                </select>
              </div>
              <div class="col-6">
                <label class="form-label fs-9 fw-bold text-muted text-uppercase">Base Price ($)</label>
                <input type="number" step="0.01" min="0" class="form-control rounded-3 fs-8" id="edit-product-price" required />
              </div>
            </div>

            <button class="btn btn-primary w-100 fw-bold py-2 rounded-3 hover-scale fs-8 shadow-sm" onclick="saveEditedProduct()">
              <i class="bi bi-save me-1.5"></i>Save Catalog Item
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal 2: Apply Discount -->
    <div class="modal fade" id="productDiscountModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered" style="max-width: 380px;">
        <div class="modal-content border-0" style="border-radius: 20px;">
          <div class="modal-header border-0 pb-0">
            <h5 class="fw-bold text-dark mb-0">Apply Store Discount</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body text-center">
            <input type="hidden" id="discount-product-id" />
            <p class="text-muted fs-9 mb-3">Adjust the price markdown discount for product: <br><b class="text-dark" id="discount-product-title">Product Name</b></p>
            
            <div class="mb-4">
              <label class="form-label fs-9 fw-bold text-muted text-uppercase d-block text-start">Discount Percentage (%)</label>
              <div class="input-group">
                <input type="number" min="0" max="99" class="form-control rounded-3 fs-8" id="discount-percentage" placeholder="15" required />
                <span class="input-group-text bg-light rounded-end">% Off</span>
              </div>
            </div>

            <button class="btn btn-primary w-100 fw-bold py-2 rounded-3 hover-scale fs-8 shadow-sm" onclick="saveProductDiscount()">
              <i class="bi bi-percent me-1"></i>Apply Markdown Discount
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom Admin Scripts -->
    <script src="/admin/js/storage.js" type="module"></script>
    <script src="/admin/js/admin.js" type="module"></script>
    <script src="/admin/js/marketplace.js" type="module"></script>
  </body>
</html>
