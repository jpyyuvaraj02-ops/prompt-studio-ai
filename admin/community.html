<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt Studio AI - Community Moderation</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <!-- Core custom styles -->
    <link rel="stylesheet" href="/admin/css/admin.css" />
    <link rel="stylesheet" href="/admin/css/responsive.css" />
  </head>
  <body>

    <!-- Sidebar injection target -->
    <div id="admin-sidebar-target"></div>

    <!-- Main Content Panel -->
    <div class="admin-main-wrapper">
      
      <!-- Header target -->
      <div id="admin-header-target" data-title="Community Moderation"></div>

      <!-- Action Panel -->
      <div class="premium-card p-3.5 mb-4 animate-fade-in">
        <div class="row g-3 align-items-center justify-content-between">
          <div class="col-12 col-md-9 d-flex flex-wrap gap-2">
            <!-- Search bar -->
            <div class="position-relative flex-grow-1" style="max-width: 320px;">
              <span class="position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"><i class="bi bi-search"></i></span>
              <input type="text" class="form-control rounded-pill ps-5 fs-8" id="community-search" placeholder="Search prompts, tags, creators..." />
            </div>

            <!-- Category filter -->
            <select class="form-select rounded-pill fs-8" id="community-category-filter" style="max-width: 140px;">
              <option value="All">All Categories</option>
              <option value="Frontend">Frontend</option>
              <option value="Fullstack">Fullstack</option>
              <option value="Database">Database</option>
            </select>

            <!-- Status filter -->
            <select class="form-select rounded-pill fs-8" id="community-status-filter" style="max-width: 140px;">
              <option value="All">All Statuses</option>
              <option value="approved">Approved</option>
              <option value="pending">Pending</option>
              <option value="rejected">Rejected</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Bulk Actions Floater (Visible when selections are checked) -->
      <div id="bulk-actions-bar" class="alert bg-primary bg-opacity-10 text-primary border border-primary border-opacity-10 rounded-4 px-4 py-3 d-flex align-items-center justify-content-between mb-4 d-none animate-fade-in">
        <div class="d-flex align-items-center gap-2.5 fs-8">
          <i class="bi bi-info-circle-fill fs-5 text-primary animate-pulse"></i>
          <span>Selected <b><span id="selected-count">0</span></b> community posts. Apply bulk moderator actions:</span>
        </div>
        <div class="d-flex gap-2">
          <button class="btn btn-success rounded-pill px-3 fs-9 py-1 fw-bold border-0" onclick="bulkApproveSelected()"><i class="bi bi-check-circle me-1"></i>Approve All</button>
          <button class="btn btn-warning rounded-pill px-3 fs-9 py-1 fw-bold text-dark border-0" onclick="bulkRejectSelected()"><i class="bi bi-x-circle me-1"></i>Reject All</button>
          <button class="btn btn-danger rounded-pill px-3 fs-9 py-1 fw-bold border-0" onclick="bulkDeleteSelected()"><i class="bi bi-trash me-1"></i>Delete Selected</button>
        </div>
      </div>

      <!-- Moderation Table Grid -->
      <div class="premium-card mb-4 animate-fade-in">
        <div class="table-responsive">
          <table class="table custom-table align-middle mb-0 fs-8">
            <thead>
              <tr>
                <th style="width: 40px;">
                  <input type="checkbox" class="form-check-input" id="select-all-checkbox" onchange="toggleSelectAllPrompts(event)" />
                </th>
                <th>ID</th>
                <th>Prompt Title & Details</th>
                <th>Creator</th>
                <th>Category</th>
                <th>Price</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="community-table-body">
              <!-- Rendered dynamically by community.js -->
            </tbody>
          </table>
        </div>
      </div>

    </div>

    <!-- ==========================================
         MODALS & DIALOGS
         ========================================== -->

    <!-- Modal: Edit Prompt details -->
    <div class="modal fade" id="promptEditModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered" style="max-width: 460px;">
        <div class="modal-content border-0" style="border-radius: 20px;">
          <div class="modal-header border-0 pb-0">
            <h5 class="fw-bold text-dark mb-0">Modify Community Prompt</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body">
            <input type="hidden" id="edit-prompt-id" />
            
            <div class="mb-3 text-start">
              <label class="form-label fs-9 fw-bold text-muted text-uppercase">Prompt Name / Title</label>
              <input type="text" class="form-control rounded-3 fs-8" id="edit-prompt-title" required />
            </div>

            <div class="mb-3 text-start">
              <label class="form-label fs-9 fw-bold text-muted text-uppercase">Brief Description</label>
              <textarea class="form-control rounded-3 fs-8" id="edit-prompt-description" rows="3" required></textarea>
            </div>

            <div class="row g-2 mb-4">
              <div class="col-6">
                <label class="form-label fs-9 fw-bold text-muted text-uppercase">Category</label>
                <select class="form-select rounded-3 fs-8" id="edit-prompt-category">
                  <option value="Frontend">Frontend</option>
                  <option value="Fullstack">Fullstack</option>
                  <option value="Database">Database</option>
                </select>
              </div>
              <div class="col-6">
                <label class="form-label fs-9 fw-bold text-muted text-uppercase">Pricing ($)</label>
                <input type="number" step="0.01" min="0" class="form-control rounded-3 fs-8" id="edit-prompt-price" required />
              </div>
            </div>

            <button class="btn btn-primary w-100 fw-bold py-2 rounded-3 hover-scale fs-8 shadow-sm" onclick="saveEditedPrompt()">
              <i class="bi bi-save me-1.5"></i>Save Post Changes
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom Admin Scripts -->
    <script src="/admin/js/storage.js" type="module"></script>
    <script src="/admin/js/admin.js" type="module"></script>
    <script src="/admin/js/community.js" type="module"></script>
  </body>
</html>
