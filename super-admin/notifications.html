<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt Studio AI - Master Broadcasts</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <!-- Core styles -->
    <link rel="stylesheet" href="/super-admin/css/super-admin.css" />
    <link rel="stylesheet" href="/super-admin/css/responsive.css" />
  </head>
  <body style="background-color: #030712; color: #f3f4f6;">

    <!-- Sidebar injection target -->
    <div id="super-sidebar-target"></div>

    <!-- Main Content Panel -->
    <div class="super-main-wrapper">
      
      <!-- Header target -->
      <div id="super-header-target" data-title="Root Broadcast Center"></div>

      <div class="row g-4 animate-fade-in">
        <!-- Draft Form Column -->
        <div class="col-12 col-md-5">
          <div class="premium-card bg-dark border-secondary p-4">
            <h5 class="fw-bold text-white mb-3"><i class="bi bi-megaphone-fill text-violet me-2"></i>Draft Global Broadcast</h5>
            <form id="super-broadcast-form" onsubmit="event.preventDefault(); publishSuperBroadcast();">
              <div class="mb-3">
                <label class="form-label fs-9 fw-bold text-white-50 text-uppercase">Alert Headline / Title</label>
                <input type="text" class="form-control bg-dark border-secondary text-white rounded-3 fs-8" id="super-broadcast-title" placeholder="e.g. Host Database Shard Rotation" required />
              </div>

              <div class="mb-3">
                <label class="form-label fs-9 fw-bold text-white-50 text-uppercase">Priority Category</label>
                <select class="form-select bg-dark border-secondary text-white rounded-3 fs-8" id="super-broadcast-priority">
                  <option value="Critical">🚨 Root Core Alert</option>
                  <option value="Important">⚠️ Major System Notice</option>
                  <option value="Notice">📢 Routine System Broadcast</option>
                </select>
              </div>

              <div class="mb-4">
                <label class="form-label fs-9 fw-bold text-white-50 text-uppercase">Notice Message Details</label>
                <textarea class="form-control bg-dark border-secondary text-white rounded-3 fs-8" id="super-broadcast-description" rows="4" placeholder="Enter notice payload details..." required></textarea>
              </div>

              <button type="submit" class="btn btn-primary w-100 fw-bold py-2.5 rounded-3 hover-scale fs-8 shadow-sm" style="background-color: #7c3aed; border-color: #7c3aed;">
                <i class="bi bi-broadcast me-1.5"></i>Broadcast Global Alert
              </button>
            </form>
          </div>
        </div>

        <!-- Broadcast Feed Column -->
        <div class="col-12 col-md-7">
          <div class="premium-card bg-dark border-secondary p-4 h-100">
            <h5 class="fw-bold text-white mb-3"><i class="bi bi-bell-fill text-danger me-2"></i>Active Broad Alerts Feed</h5>
            <div id="super-broadcasts-feed" class="d-flex flex-column gap-3">
              <!-- Rendered dynamically -->
            </div>
          </div>
        </div>
      </div>

    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom Super Admin Scripts -->
    <script src="/admin/js/storage.js" type="module"></script>
    <script src="/super-admin/js/dashboard.js" type="module"></script>

    <script>
      function renderSuperBroadcasts() {
        const container = document.getElementById('super-broadcasts-feed');
        if (!container) return;

        const list = StorageHelper.get('ps_announcements');
        if (list.length === 0) {
          container.innerHTML = `
            <div class="text-center py-5 text-white-50">
              <i class="bi bi-bell-slash fs-1 d-block mb-2"></i>
              <span>No global alerts published.</span>
            </div>
          `;
        } else {
          container.innerHTML = list.map(a => {
            const priorityClass = a.priority === 'Critical' ? 'bg-danger text-white' : (a.priority === 'Important' ? 'bg-warning text-dark' : 'bg-primary text-white');
            return `
              <div class="p-3 border border-secondary rounded-4 bg-dark shadow position-relative animate-fade-in">
                <div class="d-flex align-items-center justify-content-between mb-2">
                  <span class="badge ${priorityClass} fs-9 rounded px-2.5 py-1 text-uppercase">${a.priority}</span>
                  <span class="text-white-50 fs-9" style="font-size: 11px;">Published: ${a.date}</span>
                </div>
                <h5 class="fw-bold text-white mb-1 fs-8">${a.title}</h5>
                <p class="text-white-50 fs-8 mb-0 leading-relaxed">${a.description}</p>
                <button class="btn btn-link text-danger p-1 position-absolute top-0 end-0 mt-2 me-2" onclick="deleteSuperBroadcast('${a.id}')">
                  <i class="bi bi-trash fs-8"></i>
                </button>
              </div>
            `;
          }).join('');
        }
      }

      window.publishSuperBroadcast = function() {
        const title = document.getElementById('super-broadcast-title').value.trim();
        const priority = document.getElementById('super-broadcast-priority').value;
        const description = document.getElementById('super-broadcast-description').value.trim();

        if (!title || !description) return;

        const list = StorageHelper.get('ps_announcements');
        const newAnn = {
          id: "ann-" + Date.now(),
          title,
          priority,
          description,
          date: new Date().toISOString().replace('T', ' ').substring(0, 16)
        };

        list.unshift(newAnn);
        StorageHelper.set('ps_announcements', list);

        StorageHelper.addLog("super@promptstudio.ai", "Published Master Alert", "Settings", "Success", `Published system broadcast notice: ${title}`);
        StorageHelper.addNotification(`Global Master Broadcast: "${title}"`, "System");

        document.getElementById('super-broadcast-form').reset();
        renderSuperBroadcasts();
      };

      window.deleteSuperBroadcast = function(id) {
        if (confirm("Are you sure you want to retract/delete this broadcast alert notice?")) {
          const list = StorageHelper.get('ps_announcements');
          const target = list.find(a => a.id === id);
          const updated = list.filter(a => a.id !== id);
          StorageHelper.set('ps_announcements', updated);

          StorageHelper.addLog("super@promptstudio.ai", "Retracted Master Alert", "Settings", "Success", `Retracted system-wide notice: ${target ? target.title : id}`);
          renderSuperBroadcasts();
        }
      };

      document.addEventListener('DOMContentLoaded', renderSuperBroadcasts);
    </script>
  </body>
</html>
