<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt Studio AI - Master Marketplace Control</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <!-- Core styles -->
    <link rel="stylesheet" href="/super-admin/css/super-admin.css" />
    <link rel="stylesheet" href="/super-admin/css/responsive.css" />
  </head>
  <body style="background-color: #030712; color: #f3f4f6;">

    <!-- Sidebar injection target -->
    <div id="super-sidebar-target"></div>

    <!-- Main Content Panel -->
    <div class="super-main-wrapper">
      
      <!-- Header target -->
      <div id="super-header-target" data-title="Master Marketplace Catalog"></div>

      <!-- Quick Search Bar -->
      <div class="premium-card bg-dark border-secondary p-3.5 mb-4 animate-fade-in">
        <div class="row g-3 align-items-center justify-content-between">
          <div class="col-12 col-md-8 d-flex flex-wrap gap-2">
            <div class="position-relative flex-grow-1" style="max-width: 320px;">
              <span class="position-absolute top-50 start-0 translate-middle-y ms-3 text-white-50"><i class="bi bi-search"></i></span>
              <input type="text" class="form-control bg-dark border-secondary text-white rounded-pill ps-5 fs-8" id="super-market-search" placeholder="Search product title..." onkeyup="loadMasterMarket()" />
            </div>

            <select class="form-select bg-dark border-secondary text-white rounded-pill fs-8" id="super-market-category" style="max-width: 140px;" onchange="loadMasterMarket()">
              <option value="All">All Categories</option>
              <option value="AI">AI & LLM</option>
              <option value="Database">Database</option>
              <option value="Fullstack">Full Stack</option>
              <option value="Frontend">Frontend</option>
            </select>
          </div>
        </div>
      </div>

      <!-- Marketplace Catalog Grid -->
      <div class="premium-card bg-dark border-secondary mb-4 animate-fade-in">
        <div class="table-responsive">
          <table class="table custom-table table-dark align-middle mb-0 fs-8">
            <thead>
              <tr style="color: #9ca3af;">
                <th>ID</th>
                <th>Product Info</th>
                <th>Author</th>
                <th>Category</th>
                <th>Price</th>
                <th>Downloads</th>
                <th>Rating</th>
                <th>Commission Rate</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="super-market-table-body">
              <!-- Rendered dynamically -->
            </tbody>
          </table>
        </div>
      </div>

    </div>

    <!-- Modal: Adjust commission rate -->
    <div class="modal fade" id="commissionEditModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered" style="max-width: 380px;">
        <div class="modal-content bg-dark border-secondary text-white" style="border-radius: 20px;">
          <div class="modal-header border-0 pb-0">
            <h5 class="fw-bold text-white mb-0">Override Listing Commission</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body text-center">
            <input type="hidden" id="commission-product-id" />
            <p class="text-white-50 fs-9 mb-3">Modify custom commissions fee charged specifically for listings: <br><b class="text-white" id="commission-product-title">Product Name</b></p>
            
            <div class="mb-4 text-start">
              <label class="form-label fs-9 fw-bold text-white-50 text-uppercase d-block">Listing Commission Rate (%)</label>
              <div class="input-group">
                <span class="input-group-text bg-secondary border-secondary text-white">%</span>
                <input type="number" min="0" max="90" class="form-control bg-dark border-secondary text-white rounded-end fs-8" id="commission-percentage" placeholder="15" required />
              </div>
            </div>

            <button class="btn btn-primary w-100 fw-bold py-2 rounded-3 hover-scale fs-8 shadow-sm" style="background-color: #7c3aed; border-color: #7c3aed;" onclick="saveCustomCommission()">
              <i class="bi bi-shield-check me-1.5"></i>Apply Custom Commission Override
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom Super Admin Scripts -->
    <script src="/admin/js/storage.js" type="module"></script>
    <script src="/super-admin/js/dashboard.js" type="module"></script>

    <script>
      function loadMasterMarket() {
        const tableBody = document.getElementById('super-market-table-body');
        if (!tableBody) return;

        const items = StorageHelper.get('ps_marketplace');
        const query = document.getElementById('super-market-search').value.toLowerCase();
        const category = document.getElementById('super-market-category').value;

        const filtered = items.filter(m => {
          const matchesSearch = m.title.toLowerCase().includes(query) || (m.creator?.name || "").toLowerCase().includes(query);
          const matchesCategory = category === 'All' || m.category === category;
          return matchesSearch && matchesCategory;
        });

        if (filtered.length === 0) {
          tableBody.innerHTML = `<tr><td colspan="9" class="text-center py-4 text-white-50">No marketplace listings found.</td></tr>`;
        } else {
          tableBody.innerHTML = filtered.map(m => {
            const commRate = m.customCommission !== undefined ? m.customCommission : 15;
            return `
              <tr>
                <td><span class="font-monospace fw-bold text-white-50" style="font-size: 0.8rem;">${m.id}</span></td>
                <td>
                  <div style="max-width: 260px;">
                    <span class="fw-bold text-white d-block text-truncate" title="${m.title}">${m.title}</span>
                    <span class="text-white-50 fs-9 text-truncate d-block" style="font-size: 0.75rem;">${m.description}</span>
                  </div>
                </td>
                <td>
                  <div class="d-flex align-items-center gap-2">
                    <img src="${m.creator?.avatar || 'https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=80'}" class="rounded-circle border" style="width: 24px; height: 24px; object-fit: cover;" />
                    <span class="fs-9 fw-semibold text-white">${m.creator?.name || 'Anonymous'}</span>
                  </div>
                </td>
                <td><span class="badge bg-light text-dark px-2 py-0.5 rounded">${m.category}</span></td>
                <td><span class="fw-bold text-white">$${(m.price || 0).toFixed(2)}</span></td>
                <td><span class="fw-semibold text-white">${m.downloads || 0}</span></td>
                <td><span class="fw-semibold text-warning"><i class="bi bi-star-fill me-1" style="font-size: 10px;"></i>${m.rating || '4.5'}</span></td>
                <td><span class="badge bg-violet bg-opacity-20 text-violet px-2.5 py-1 text-uppercase" style="font-size: 10px;">${commRate}% fee</span></td>
                <td>
                  <div class="d-flex align-items-center gap-1.5">
                    <button class="btn btn-dark btn-sm border-secondary text-violet" onclick="editCommissionModal('${m.id}')" title="Adjust Commission"><i class="bi bi-percent"></i></button>
                    <button class="btn btn-dark btn-sm border-secondary text-danger" onclick="purgeMasterProduct('${m.id}')" title="Purge listing"><i class="bi bi-trash"></i></button>
                  </div>
                </td>
              </tr>
            `;
          }).join('');
        }
      }

      window.editCommissionModal = function(id) {
        const items = StorageHelper.get('ps_marketplace');
        const item = items.find(m => m.id === id);
        if (!item) return;

        document.getElementById('commission-product-id').value = item.id;
        document.getElementById('commission-product-title').innerText = item.title;
        document.getElementById('commission-percentage').value = item.customCommission !== undefined ? item.customCommission : 15;

        const myModal = new bootstrap.Modal(document.getElementById('commissionEditModal'));
        myModal.show();
      };

      window.saveCustomCommission = function() {
        const id = document.getElementById('commission-product-id').value;
        const percentage = parseInt(document.getElementById('commission-percentage').value);

        if (isNaN(percentage) || percentage < 0 || percentage > 90) {
          alert("Please enter a valid commission fee (0 - 90%).");
          return;
        }

        const items = StorageHelper.get('ps_marketplace');
        const index = items.findIndex(m => m.id === id);
        if (index !== -1) {
          items[index].customCommission = percentage;
          StorageHelper.set('ps_marketplace', items);

          StorageHelper.addLog("super@promptstudio.ai", "Overrode Commission Fee", "Marketplace", "Success", `Altered list commission rate to ${percentage}% specifically on product: ${items[index].title}`);
          bootstrap.Modal.getInstance(document.getElementById('commissionEditModal')).hide();
          loadMasterMarket();
        }
      };

      window.purgeMasterProduct = function(id) {
        if (confirm("Are you absolutely sure you want to permanently delete this marketplace package? This action cannot be undone.")) {
          const items = StorageHelper.get('ps_marketplace');
          const target = items.find(m => m.id === id);
          const updated = items.filter(m => m.id !== id);
          StorageHelper.set('ps_marketplace', updated);

          StorageHelper.addLog("super@promptstudio.ai", "Master Purged Product", "Marketplace", "Success", `Permanently purged marketplace product catalog item: ${target ? target.title : id}`);
          loadMasterMarket();
        }
      };

      document.addEventListener('DOMContentLoaded', loadMasterMarket);
    </script>
  </body>
</html>
