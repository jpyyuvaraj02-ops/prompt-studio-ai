<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt Studio AI - Super Configurations</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <!-- Core styles -->
    <link rel="stylesheet" href="/super-admin/css/super-admin.css" />
    <link rel="stylesheet" href="/super-admin/css/responsive.css" />
  </head>
  <body style="background-color: #030712; color: #f3f4f6;">

    <!-- Sidebar injection target -->
    <div id="super-sidebar-target"></div>

    <!-- Main Content Panel -->
    <div class="super-main-wrapper">
      
      <!-- Header target -->
      <div id="super-header-target" data-title="Root System Settings"></div>

      <!-- Settings Panel Form -->
      <div class="premium-card bg-dark border-secondary p-4 animate-fade-in" style="max-width: 720px;">
        <h5 class="fw-bold text-white mb-4"><i class="bi bi-sliders2-vertical text-violet me-2"></i>Root System Parameters</h5>
        
        <form id="super-settings-form" onsubmit="event.preventDefault(); saveSuperSettings();">
          <!-- Maintenance mode & registrations -->
          <div class="row g-3 mb-4">
            <div class="col-12 col-sm-6">
              <div class="p-3 border border-secondary rounded-4 bg-dark">
                <div class="form-check form-switch text-start">
                  <input class="form-check-input" type="checkbox" id="super-settings-maintenance" />
                  <label class="form-check-label fw-bold text-white fs-8" for="super-settings-maintenance">🛠️ Maintenance Mode</label>
                  <p class="text-white-50 fs-9 mb-0 leading-normal mt-1" style="font-size: 11.5px;">Redirect non-admin visitors to a static maintenance page placeholder.</p>
                </div>
              </div>
            </div>

            <div class="col-12 col-sm-6">
              <div class="p-3 border border-secondary rounded-4 bg-dark">
                <div class="form-check form-switch text-start">
                  <input class="form-check-input" type="checkbox" id="super-settings-registrations" />
                  <label class="form-check-label fw-bold text-white fs-8" for="super-settings-registrations">👤 Open Registrations</label>
                  <p class="text-white-50 fs-9 mb-0 leading-normal mt-1" style="font-size: 11.5px;">Allow visitors to register new accounts on the main platform.</p>
                </div>
              </div>
            </div>
          </div>

          <!-- Numeric rates -->
          <div class="row g-3 mb-4 border-top border-secondary pt-4">
            <h6 class="fw-bold text-white mb-1 fs-8">Platform Processing Rates</h6>
            <div class="col-12 col-sm-6">
              <label class="form-label fs-9 fw-bold text-white-50 text-uppercase">Marketplace Fee Charge (%)</label>
              <div class="input-group">
                <span class="input-group-text bg-secondary border-secondary text-white">%</span>
                <input type="number" step="0.1" min="0" max="90" class="form-control bg-dark border-secondary text-white rounded-end fs-8" id="super-settings-market-fee" required />
              </div>
            </div>

            <div class="col-12 col-sm-6">
              <label class="form-label fs-9 fw-bold text-white-50 text-uppercase">Minimum Payout Balance ($)</label>
              <div class="input-group">
                <span class="input-group-text bg-secondary border-secondary text-white">$</span>
                <input type="number" step="5" min="10" max="1000" class="form-control bg-dark border-secondary text-white rounded-end fs-8" id="super-settings-min-payout" required />
              </div>
            </div>
          </div>

          <!-- Backup frequency -->
          <div class="row g-3 mb-4">
            <div class="col-12 col-sm-6">
              <label class="form-label fs-9 fw-bold text-white-50 text-uppercase">Automatic Cloud Backup Frequency</label>
              <select class="form-select bg-dark border-secondary text-white rounded-3 fs-8" id="super-settings-backup-freq">
                <option value="Daily">Daily backups</option>
                <option value="Weekly">Weekly backups</option>
                <option value="Monthly">Monthly backups</option>
              </select>
            </div>
          </div>

          <!-- Submit settings -->
          <button type="submit" class="btn btn-primary rounded-pill px-4 fs-8 fw-bold hover-scale mt-3 shadow" style="background-color: #7c3aed; border-color: #7c3aed;">
            <i class="bi bi-shield-check-fill me-1.5"></i>Save Root Settings
          </button>
        </form>
      </div>

    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom Super Admin Scripts -->
    <script src="/admin/js/storage.js" type="module"></script>
    <script src="/super-admin/js/dashboard.js" type="module"></script>

    <script>
      function loadSuperSettings() {
        const settings = StorageHelper.get('ps_global_settings');

        document.getElementById('super-settings-maintenance').checked = settings.maintenanceMode || false;
        document.getElementById('super-settings-registrations').checked = settings.openRegistrations !== false;

        document.getElementById('super-settings-market-fee').value = settings.marketplaceFee || 15.0;
        document.getElementById('super-settings-min-payout').value = settings.minPayoutBalance || 50.0;
        document.getElementById('super-settings-backup-freq').value = settings.backupFrequency || "Daily";
      }

      window.saveSuperSettings = function() {
        const maintenance = document.getElementById('super-settings-maintenance').checked;
        const registrations = document.getElementById('super-settings-registrations').checked;

        const marketFee = parseFloat(document.getElementById('super-settings-market-fee').value) || 15.0;
        const minPayout = parseFloat(document.getElementById('super-settings-min-payout').value) || 50.0;
        const backupFreq = document.getElementById('super-settings-backup-freq').value;

        const updatedSettings = StorageHelper.get('ps_global_settings');
        updatedSettings.maintenanceMode = maintenance;
        updatedSettings.openRegistrations = registrations;
        updatedSettings.marketplaceFee = marketFee;
        updatedSettings.minPayoutBalance = minPayout;
        updatedSettings.backupFrequency = backupFreq;

        StorageHelper.set('ps_global_settings', updatedSettings);

        StorageHelper.addLog("super@promptstudio.ai", "Updated Master Settings", "Settings", "Success", "Modified core configurations on global namespace.");
        StorageHelper.addNotification("Global root config variables synchronized.", "Settings");

        alert("Super configurations saved successfully!");
      };

      document.addEventListener('DOMContentLoaded', loadSuperSettings);
    </script>
  </body>
</html>
