<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt Studio AI - Security Center</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <!-- Core styles -->
    <link rel="stylesheet" href="/super-admin/css/super-admin.css" />
    <link rel="stylesheet" href="/super-admin/css/responsive.css" />
  </head>
  <body style="background-color: #030712; color: #f3f4f6;">

    <!-- Sidebar injection target -->
    <div id="super-sidebar-target"></div>

    <!-- Main Content Panel -->
    <div class="super-main-wrapper">
      
      <!-- Header target -->
      <div id="super-header-target" data-title="Root Security Center"></div>

      <div class="row g-4 animate-fade-in">
        <!-- Firewalls IP block lists -->
        <div class="col-12 col-md-6">
          <div class="premium-card bg-dark border-secondary p-4 h-100">
            <h5 class="fw-bold text-white mb-2"><i class="bi bi-shield-fill-x text-danger me-2"></i>IP Address Firewall Bans</h5>
            <p class="text-white-50 fs-9 mb-4">Block malicious host headers and raw client IP subnets from establishing socket tunnels.</p>

            <form id="block-ip-form" class="row g-2 mb-4" onsubmit="event.preventDefault(); blockIPAddress();">
              <div class="col-8">
                <input type="text" class="form-control bg-dark border-secondary text-white rounded-3 fs-8 font-monospace" id="block-ip-val" placeholder="e.g. 192.168.1.150" required />
              </div>
              <div class="col-4">
                <button type="submit" class="btn btn-danger w-100 fw-bold fs-8 rounded-3">Block IP</button>
              </div>
            </form>

            <div class="table-responsive">
              <table class="table custom-table table-dark align-middle mb-0 fs-9">
                <thead>
                  <tr style="color: #9ca3af;">
                    <th>IP Address Client</th>
                    <th>Date Blocked</th>
                    <th>Actions</th>
                  </tr>
                </thead>
                <tbody id="blocked-ips-table">
                  <!-- Rendered dynamically -->
                </tbody>
              </table>
            </div>
          </div>
        </div>

        <!-- System encryption security settings -->
        <div class="col-12 col-md-6">
          <div class="premium-card bg-dark border-secondary p-4 h-100">
            <h5 class="fw-bold text-white mb-3"><i class="bi bi-lock-fill text-violet me-2"></i>Global Cryptographic Keys</h5>
            
            <div class="mb-4">
              <label class="form-label fs-9 fw-bold text-white-50 text-uppercase">Active API Encryption Key (Simulated SHA-256)</label>
              <div class="input-group">
                <input type="password" class="form-control bg-dark border-secondary text-white rounded-start fs-8 font-monospace" id="api-enc-key" value="6f39d2c2084c8a8677c7b7d7b7c20a1" disabled />
                <button class="btn btn-outline-secondary border-secondary text-white" type="button" onclick="toggleEncKeyReveal()"><i id="key-reveal-icon" class="bi bi-eye"></i></button>
              </div>
            </div>

            <div class="p-3 border border-secondary rounded-4 bg-dark">
              <div class="form-check form-switch text-start d-flex justify-content-between align-items-center mb-2.5">
                <div>
                  <label class="form-check-label fw-bold text-white fs-9" for="sec-mfa">Enforce Standard Admin 2FA / MFA</label>
                  <p class="text-white-50 fs-9 mb-0 mt-0.5" style="font-size: 11px;">Force standard admins to authenticate through standard OTP push notifications.</p>
                </div>
                <input class="form-check-input flex-shrink-0" type="checkbox" id="sec-mfa" checked />
              </div>
            </div>
          </div>
        </div>
      </div>

    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom Super Admin Scripts -->
    <script src="/admin/js/storage.js" type="module"></script>
    <script src="/super-admin/js/dashboard.js" type="module"></script>

    <script>
      function loadBlockedIPs() {
        const table = document.getElementById('blocked-ips-table');
        if (!table) return;

        const ips = JSON.parse(localStorage.getItem('ps_blocked_ips')) || ['192.168.1.100', '10.0.0.45'];
        if (ips.length === 0) {
          table.innerHTML = `<tr><td colspan="3" class="text-center text-white-50 py-3">No IP address firewalls banned.</td></tr>`;
        } else {
          table.innerHTML = ips.map(ip => {
            return `
              <tr>
                <td class="font-monospace text-danger fw-bold">${ip}</td>
                <td class="text-white-50" style="font-size: 11px;">Permanent Ban</td>
                <td>
                  <button class="btn btn-dark btn-sm border-secondary text-success" onclick="unblockIPAddress('${ip}')" title="Unblock"><i class="bi bi-shield-check"></i></button>
                </td>
              </tr>
            `;
          }).join('');
        }
      }

      window.blockIPAddress = function() {
        const ipInput = document.getElementById('block-ip-val');
        const val = ipInput.value.trim();
        if (!val) return;

        const ips = JSON.parse(localStorage.getItem('ps_blocked_ips')) || ['192.168.1.100', '10.0.0.45'];
        if (!ips.includes(val)) {
          ips.push(val);
          localStorage.setItem('ps_blocked_ips', JSON.stringify(ips));

          StorageHelper.addLog("super@promptstudio.ai", "Blocked Client IP", "Security", "Success", `Banned client IP address firewall subnet: ${val}`);
        }

        ipInput.value = "";
        loadBlockedIPs();
      };

      window.unblockIPAddress = function(ip) {
        let ips = JSON.parse(localStorage.getItem('ps_blocked_ips')) || ['192.168.1.100', '10.0.0.45'];
        ips = ips.filter(item => item !== ip);
        localStorage.setItem('ps_blocked_ips', JSON.stringify(ips));

        StorageHelper.addLog("super@promptstudio.ai", "Unblocked Client IP", "Security", "Success", `Removed IP address block ban: ${ip}`);
        loadBlockedIPs();
      };

      window.toggleEncKeyReveal = function() {
        const input = document.getElementById('api-enc-key');
        const icon = document.getElementById('key-reveal-icon');
        if (input.type === 'password') {
          input.type = 'text';
          icon.className = 'bi bi-eye-slash';
        } else {
          input.type = 'password';
          icon.className = 'bi bi-eye';
        }
      };

      document.addEventListener('DOMContentLoaded', loadBlockedIPs);
    </script>
  </body>
</html>
