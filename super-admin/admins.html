<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prompt Studio AI - Admin Management</title>
    <!-- Bootstrap 5 CSS CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <!-- Bootstrap Icons CDN -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
    <!-- Core super admin styles -->
    <link rel="stylesheet" href="/super-admin/css/super-admin.css" />
    <link rel="stylesheet" href="/super-admin/css/responsive.css" />
  </head>
  <body style="background-color: #030712; color: #f3f4f6;">

    <!-- Sidebar injection target -->
    <div id="super-sidebar-target"></div>

    <!-- Main Content Panel -->
    <div class="super-main-wrapper">
      
      <!-- Header target -->
      <div id="super-header-target" data-title="Admin Management"></div>

      <!-- Action Panel -->
      <div class="premium-card bg-dark border-secondary p-3.5 mb-4 animate-fade-in">
        <div class="row g-3 align-items-center justify-content-between">
          <div class="col-12 col-md-8 d-flex flex-wrap gap-2">
            <!-- Search bar -->
            <div class="position-relative flex-grow-1" style="max-width: 320px;">
              <span class="position-absolute top-50 start-0 translate-middle-y ms-3 text-white-50"><i class="bi bi-search"></i></span>
              <input type="text" class="form-control bg-dark border-secondary text-white rounded-pill ps-5 fs-8" id="admin-search" placeholder="Search admin name, email..." onkeyup="renderAdminsTable()" />
            </div>

            <!-- Privilege filter -->
            <select class="form-select bg-dark border-secondary text-white rounded-pill fs-8" id="admin-privilege-filter" style="max-width: 150px;" onchange="renderAdminsTable()">
              <option value="All">All Levels</option>
              <option value="Full Access">Full Access</option>
              <option value="Moderator">Moderator</option>
              <option value="Billing Admin">Billing Admin</option>
            </select>
          </div>

          <div class="col-12 col-md-auto text-md-end">
            <button class="btn btn-primary rounded-pill px-3.5 fs-8 fw-semibold" style="background-color: #7c3aed; border-color: #7c3aed;" data-bs-toggle="modal" data-bs-target="#adminAddModal">
              <i class="bi bi-shield-plus me-1.5"></i>Add Standard Admin
            </button>
          </div>
        </div>
      </div>

      <!-- Admins Table Grid -->
      <div class="premium-card bg-dark border-secondary mb-4 animate-fade-in">
        <div class="table-responsive">
          <table class="table custom-table table-dark align-middle mb-0 fs-8">
            <thead>
              <tr style="color: #9ca3af;">
                <th>ID</th>
                <th>Administrator</th>
                <th>Email Address</th>
                <th>Access Level</th>
                <th>Operations count</th>
                <th>Status</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="admins-table-body">
              <!-- Rendered dynamically -->
            </tbody>
          </table>
        </div>
      </div>

    </div>

    <!-- ==========================================
         MODALS & DIALOGS
         ========================================== -->

    <!-- Modal 1: Create Admin -->
    <div class="modal fade" id="adminAddModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered" style="max-width: 420px;">
        <div class="modal-content bg-dark border-secondary text-white" style="border-radius: 20px;">
          <div class="modal-header border-0 pb-0">
            <h5 class="fw-bold text-white mb-0">Register New Administrator</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body text-start">
            <form id="add-admin-form" onsubmit="event.preventDefault(); addNewAdmin();">
              <div class="mb-3">
                <label class="form-label fs-9 fw-bold text-white-50 text-uppercase">Full Name</label>
                <input type="text" class="form-control bg-dark border-secondary text-white rounded-3 fs-8" id="add-admin-name" placeholder="Sarah Jenkins" required />
              </div>

              <div class="mb-3">
                <label class="form-label fs-9 fw-bold text-white-50 text-uppercase">Email Address</label>
                <input type="email" class="form-control bg-dark border-secondary text-white rounded-3 fs-8" id="add-admin-email" placeholder="sarah@promptstudio.ai" required />
              </div>

              <div class="mb-4">
                <label class="form-label fs-9 fw-bold text-white-50 text-uppercase">Access Privilege Level</label>
                <select class="form-select bg-dark border-secondary text-white rounded-3 fs-8" id="add-admin-privilege">
                  <option value="Full Access">Full Access (Standard Admin)</option>
                  <option value="Moderator">Moderator (Community Admin)</option>
                  <option value="Billing Admin">Billing Admin (Marketplace Admin)</option>
                </select>
              </div>

              <button type="submit" class="btn btn-primary w-100 fw-bold py-2 rounded-3 hover-scale fs-8 shadow-sm" style="background-color: #7c3aed; border-color: #7c3aed;">
                <i class="bi bi-shield-check me-1.5"></i>Provision Account
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <!-- Modal 2: Edit Admin -->
    <div class="modal fade" id="adminEditModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered" style="max-width: 420px;">
        <div class="modal-content bg-dark border-secondary text-white" style="border-radius: 20px;">
          <div class="modal-header border-0 pb-0">
            <h5 class="fw-bold text-white mb-0">Modify Admin Privileges</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body text-start">
            <input type="hidden" id="edit-admin-id" />
            
            <div class="mb-3">
              <label class="form-label fs-9 fw-bold text-white-50 text-uppercase">Administrator Name</label>
              <input type="text" class="form-control bg-dark border-secondary text-white rounded-3 fs-8" id="edit-admin-name" required />
            </div>

            <div class="mb-3">
              <label class="form-label fs-9 fw-bold text-white-50 text-uppercase">Privilege Access Level</label>
              <select class="form-select bg-dark border-secondary text-white rounded-3 fs-8" id="edit-admin-privilege">
                <option value="Full Access">Full Access</option>
                <option value="Moderator">Moderator</option>
                <option value="Billing Admin">Billing Admin</option>
              </select>
            </div>

            <button class="btn btn-primary w-100 fw-bold py-2 rounded-3 hover-scale fs-8 shadow-sm" style="background-color: #7c3aed; border-color: #7c3aed;" onclick="saveEditedAdmin()">
              <i class="bi bi-save me-1.5"></i>Save Access Keys
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Bootstrap Bundle JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom Super Admin Scripts -->
    <script src="/admin/js/storage.js" type="module"></script>
    <script src="/super-admin/js/dashboard.js" type="module"></script>

    <script>
      function renderAdminsTable() {
        const tableBody = document.getElementById('admins-table-body');
        if (!tableBody) return;

        const admins = StorageHelper.get('ps_admins_list');
        const searchQuery = document.getElementById('admin-search').value.toLowerCase();
        const privilegeFilter = document.getElementById('admin-privilege-filter').value;

        const filtered = admins.filter(a => {
          const matchesSearch = a.name.toLowerCase().includes(searchQuery) || a.email.toLowerCase().includes(searchQuery);
          const matchesPrivilege = privilegeFilter === 'All' || a.privileges === privilegeFilter;
          return matchesSearch && matchesPrivilege;
        });

        if (filtered.length === 0) {
          tableBody.innerHTML = `<tr><td colspan="7" class="text-center py-4 text-white-50">No administrators found.</td></tr>`;
        } else {
          tableBody.innerHTML = filtered.map(a => {
            const statusClass = a.status === 'Active' ? 'bg-success bg-opacity-20 text-success' : 'bg-danger bg-opacity-20 text-danger';
            return `
              <tr>
                <td><span class="font-monospace fw-bold text-white-50" style="font-size: 0.8rem;">${a.id}</span></td>
                <td>
                  <div class="d-flex align-items-center gap-2.5">
                    <img src="${a.avatar}" class="rounded-circle border" style="width: 28px; height: 28px; object-fit: cover;" />
                    <span class="fw-bold text-white">${a.name}</span>
                  </div>
                </td>
                <td><span class="text-white-50">${a.email}</span></td>
                <td><span class="badge bg-violet bg-opacity-20 text-violet px-2.5 py-1 text-uppercase" style="font-size: 10px;">${a.privileges}</span></td>
                <td><span class="fw-bold text-white">${a.logsCount || 0} audits</span></td>
                <td><span class="badge ${statusClass} px-2 py-0.5 rounded">${a.status}</span></td>
                <td>
                  <div class="d-flex align-items-center gap-1.5">
                    <button class="btn btn-dark btn-sm border-secondary text-white" onclick="editAdminModal('${a.id}')" title="Edit Access"><i class="bi bi-shield-check"></i></button>
                    <button class="btn btn-dark btn-sm border-secondary text-warning" onclick="toggleAdminStatus('${a.id}')" title="Toggle Access"><i class="bi bi-slash-circle"></i></button>
                    <button class="btn btn-dark btn-sm border-secondary text-danger" onclick="deleteAdmin('${a.id}')" title="Delete Admin"><i class="bi bi-trash"></i></button>
                  </div>
                </td>
              </tr>
            `;
          }).join('');
        }
      }

      window.addNewAdmin = function() {
        const name = document.getElementById('add-admin-name').value.trim();
        const email = document.getElementById('add-admin-email').value.trim();
        const privileges = document.getElementById('add-admin-privilege').value;

        if (!name || !email) return;

        const admins = StorageHelper.get('ps_admins_list');
        const newId = "ADM-" + (Math.floor(Math.random() * 900) + 100);
        const newAdmin = {
          id: newId,
          name,
          email,
          avatar: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=80",
          privileges,
          logsCount: 0,
          status: 'Active'
        };

        admins.unshift(newAdmin);
        StorageHelper.set('ps_admins_list', admins);

        StorageHelper.addLog("super@promptstudio.ai", "Admin Registered", "Security", "Success", `Provisioned core admin account for ${name} (${newId})`);
        
        document.getElementById('add-admin-form').reset();
        bootstrap.Modal.getInstance(document.getElementById('adminAddModal')).hide();
        renderAdminsTable();
      };

      window.editAdminModal = function(id) {
        const admins = StorageHelper.get('ps_admins_list');
        const admin = admins.find(a => a.id === id);
        if (!admin) return;

        document.getElementById('edit-admin-id').value = admin.id;
        document.getElementById('edit-admin-name').value = admin.name;
        document.getElementById('edit-admin-privilege').value = admin.privileges;

        const myModal = new bootstrap.Modal(document.getElementById('adminEditModal'));
        myModal.show();
      };

      window.saveEditedAdmin = function() {
        const id = document.getElementById('edit-admin-id').value;
        const name = document.getElementById('edit-admin-name').value.trim();
        const privilege = document.getElementById('edit-admin-privilege').value;

        if (!name) return;

        const admins = StorageHelper.get('ps_admins_list');
        const index = admins.findIndex(a => a.id === id);
        if (index !== -1) {
          admins[index].name = name;
          admins[index].privileges = privilege;
          StorageHelper.set('ps_admins_list', admins);

          StorageHelper.addLog("super@promptstudio.ai", "Admin Modified", "Security", "Success", `Adjusted credentials layout for admin: ${name}`);
          bootstrap.Modal.getInstance(document.getElementById('adminEditModal')).hide();
          renderAdminsTable();
        }
      };

      window.toggleAdminStatus = function(id) {
        const admins = StorageHelper.get('ps_admins_list');
        const index = admins.findIndex(a => a.id === id);
        if (index !== -1) {
          const nextStatus = admins[index].status === 'Active' ? 'Suspended' : 'Active';
          admins[index].status = nextStatus;
          StorageHelper.set('ps_admins_list', admins);

          StorageHelper.addLog("super@promptstudio.ai", `Admin ${nextStatus}`, "Security", "Success", `${nextStatus} credentials authorization for ${admins[index].name}`);
          renderAdminsTable();
        }
      };

      window.deleteAdmin = function(id) {
        if (confirm("Are you absolutely sure you want to de-provision and delete this administrator?")) {
          const admins = StorageHelper.get('ps_admins_list');
          const target = admins.find(a => a.id === id);
          const updated = admins.filter(a => a.id !== id);
          StorageHelper.set('ps_admins_list', updated);

          StorageHelper.addLog("super@promptstudio.ai", "Admin Purged", "Security", "Success", `De-provisioned admin account ${target ? target.name : id}`);
          renderAdminsTable();
        }
      };

      document.addEventListener('DOMContentLoaded', renderAdminsTable);
    </script>
  </body>
</html>
